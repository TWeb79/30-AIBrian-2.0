server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /api/health {
        access_log off;
        proxy_pass http://brain-api:8000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }


    # Proxy API requests to backend. If the upstream is unreachable nginx
    # will try fallback servers defined above. In case no upstream is live
    # return a structured JSON error so the frontend can handle it gracefully.
    location /api/ {
        # Directly proxy to the compose service name/port. The 'brain-api' service
        # in docker-compose listens on port 8000 internally, so route there.
        proxy_pass http://brain-api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow time for LLM generation (7B models on CPU can take 2-3 min)
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # No explicit upstream block here; nginx will resolve the service name
        # via Docker's embedded DNS. If you need multiple upstreams, define
        # an 'upstream' block in the global nginx config (not inside server {}).
    }

    # When upstream fails, return a small JSON payload so the frontend
    # can detect the difference between network/backend unavailable vs
    # an unexpected HTML error page.
    proxy_intercept_errors on;
    error_page 502 503 504 = /_api_unavailable.json;

    location = /_api_unavailable.json {
        internal;
        default_type application/json;
        return 503 '{"error":"backend_unavailable","message":"API unreachable"}';
    }
}
